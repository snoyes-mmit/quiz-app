<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz – Assessment Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="mmit-styles.css" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background: var(--slate-50); }

    .quiz-top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      z-index: 100;
    }

    .quiz-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4.5rem 1.25rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .quiz-bg-grad {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 280px;
      background: linear-gradient(to bottom, rgba(212,175,55,.12), transparent);
      pointer-events: none;
    }

    .quiz-inner {
      width: 100%;
      max-width: 760px;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Header */
    .quiz-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: .25rem; }
    .quiz-header-left .quiz-label {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--slate-500);
      margin-bottom: .25rem;
    }
    .quiz-header-left .quiz-counter {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--slate-900);
      line-height: 1;
    }
    .quiz-header-left .quiz-counter span { font-weight: 400; color: var(--slate-400); }
    .pct-pill {
      font-size: .875rem;
      font-weight: 600;
      color: var(--slate-500);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: .35rem .875rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }

    /* Question card */
    .q-card {
      background: var(--card);
      border: 1px solid var(--slate-100);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-card);
      padding: 2.25rem 2rem;
    }
    .q-text {
      font-size: clamp(1.0625rem, 2.5vw, 1.3125rem);
      font-weight: 600;
      color: var(--slate-900);
      line-height: 1.45;
      margin-bottom: 1.75rem;
    }
    .options { display: flex; flex-direction: column; gap: .875rem; }

    /* Footer */
    .quiz-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid rgba(226,232,240,.6);
    }

    /* Loading / error states */
    .state-center {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      padding: 2rem;
    }
  </style>
</head>
<body>

<!-- Top progress bar (thin rainbow line) -->
<div class="quiz-top-bar">
  <div id="topBar" style="height:100%;background:linear-gradient(90deg,var(--primary),#000);width:0%;transition:width .4s ease;"></div>
</div>

<div class="quiz-wrap" id="quizWrap">
  <div class="quiz-bg-grad"></div>
  <div class="quiz-inner">

    <!-- Header + progress -->
    <div>
      <div class="quiz-header">
        <div class="quiz-header-left">
          <div class="quiz-label">Assessment</div>
          <div class="quiz-counter">Question <span id="qNum">1</span> <span>/ <span id="qTotal">20</span></span></div>
        </div>
        <div class="pct-pill" id="pctPill">0% Complete</div>
      </div>
      <div style="margin-top:.875rem;">
        <div class="progress-wrap"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
      </div>
    </div>

    <!-- Question + options -->
    <div class="q-card fade-up" id="qCard">
      <p class="q-text" id="qText"></p>
      <div class="options" id="optionsList"></div>
    </div>

    <!-- Navigation -->
    <div class="quiz-footer">
      <button class="btn btn-ghost" id="prevBtn" disabled onclick="navigate(-1)">Previous</button>
      <button class="btn btn-ghost confluence-link"><a href="https://mmitnetwork.atlassian.net/wiki/spaces/CD/pages/14179631144/HTML+Wiki" style="text-decoration: none; color: #000000;" target="_blank">Confluence Link</a></button>
      <button class="btn btn-primary" id="nextBtn" disabled onclick="navigate(1)">
        <span id="nextLabel">Next Question</span>
        <svg id="nextIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </div>

  </div>
</div>

<script src="questions.js"></script>
<script>
  const name  = sessionStorage.getItem('qa_name');
  const email = sessionStorage.getItem('qa_email');
  if (!name || !email) { window.location.href = 'index.html'; }

  const answers = JSON.parse(sessionStorage.getItem('qa_answers') || 'null') || new Array(QUESTIONS.length).fill(null);
  let currentIdx = 0;

  const qNum        = document.getElementById('qNum');
  const qTotal      = document.getElementById('qTotal');
  const qText       = document.getElementById('qText');
  const optionsList = document.getElementById('optionsList');
  const progressBar = document.getElementById('progressBar');
  const topBar      = document.getElementById('topBar');
  const pctPill     = document.getElementById('pctPill');
  const prevBtn     = document.getElementById('prevBtn');
  const nextBtn     = document.getElementById('nextBtn');
  const nextLabel   = document.getElementById('nextLabel');
  const nextIcon    = document.getElementById('nextIcon');

  qTotal.textContent = QUESTIONS.length;

  function renderQuestion() {
    const q = QUESTIONS[currentIdx];
    const answered = answers[currentIdx];
    const isLast = currentIdx === QUESTIONS.length - 1;
    const pct = Math.round((currentIdx / QUESTIONS.length) * 100);

    qNum.textContent  = currentIdx + 1;
    qText.textContent = q.question;
    pctPill.textContent = pct + '% Complete';
    progressBar.style.width = pct + '%';
    topBar.style.width = pct + '%';

    prevBtn.disabled = currentIdx === 0;
    nextBtn.disabled = !answered;
    nextLabel.textContent = isLast ? 'Submit Assessment' : 'Next Question';
    nextIcon.style.display = isLast ? 'none' : '';

    optionsList.innerHTML = '';
    q.options.forEach((opt, idx) => {
      const letters = ['A','B','C','D','E','F'];
      const btn = document.createElement('button');
      btn.className = 'option-btn' + (answered === opt ? ' selected' : '');
      btn.innerHTML = `
        <span class="option-letter">${letters[idx]}</span>
        <span class="option-text">${opt}</span>
        <svg class="option-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>`;
      btn.onclick = () => selectAnswer(opt);
      optionsList.appendChild(btn);
    });
  }

  function selectAnswer(opt) {
    answers[currentIdx] = opt;
    sessionStorage.setItem('qa_answers', JSON.stringify(answers));
    renderQuestion();
  }

  function navigate(dir) {
    const isLast = currentIdx === QUESTIONS.length - 1;
    if (dir === 1 && isLast) { submitQuiz(); return; }
    currentIdx = Math.max(0, Math.min(QUESTIONS.length - 1, currentIdx + dir));
    renderQuestion();
  }

  function getSkillLevel(score) {
    if (score >= 18) return 'Expert';
    if (score >= 14) return 'Advanced';
    if (score >= 10) return 'Intermediate';
    return 'Beginner';
  }

  function submitQuiz() {
    nextBtn.disabled = true;
    nextLabel.textContent = 'Calculating…';
    nextIcon.style.display = 'none';

    const results = QUESTIONS.map((q, i) => ({
      id: q.id,
      question: q.question,
      userAnswer: answers[i] || '',
      correctAnswer: q.answer,
      isCorrect: answers[i] === q.answer
    }));

    const score      = results.filter(r => r.isCorrect).length;
    const total      = QUESTIONS.length;
    const percentage = Math.round((score / total) * 100);
    const skillLevel = getSkillLevel(score);
    const completedAt = new Date().toISOString();

    const result = { name, email, score, total, percentage, skillLevel, completedAt, results };
    sessionStorage.setItem('qa_result', JSON.stringify(result));

    setTimeout(() => { window.location.href = 'results.html'; }, 300);
  }

  renderQuestion();
</script>

</body>
</html>
