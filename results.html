<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Results – Assessment Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- jsPDF for client-side PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- canvas-confetti for celebration -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <!-- smtpjs for sending email with PDF attachment -->
  <script src="https://smtpjs.com/v3/smtp.js"></script>
  <style>
    body { background: var(--slate-50); }

    .results-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 1.25rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    /* Hero card */
    .hero-card {
      background: var(--card);
      border: 1px solid var(--slate-100);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-card);
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero-top-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--teal), var(--primary));
    }

    .trophy-wrap {
      width: 5rem; height: 5rem;
      border-radius: var(--radius-full);
      background: var(--slate-50);
      box-shadow: inset 0 2px 8px rgba(0,0,0,.06);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .trophy-icon { width: 2.375rem; height: 2.375rem; }

    .results-name {
      font-size: clamp(1.625rem, 4vw, 2.375rem);
      font-weight: 800;
      color: var(--slate-900);
      letter-spacing: -.03em;
      margin-bottom: .5rem;
    }
    .results-sub { font-size: 1.0625rem; color: var(--slate-500); margin-bottom: 2.25rem; }

    /* Action buttons */
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-top: 2.25rem;
    }
    .action-row .btn { min-width: 200px; }

    /* Breakdown card */
    .breakdown-card {
      background: var(--card);
      border: 1px solid var(--slate-100);
      border-radius: var(--radius-2xl);
      box-shadow: 0 4px 20px rgba(15,23,42,.05);
      padding: 2rem;
    }
    .breakdown-header {
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: 1.75rem;
    }
    .breakdown-header h2 { font-size: 1.375rem; font-weight: 700; color: var(--slate-900); }
    .breakdown-header svg { color: var(--slate-400); }

    .results-list { display: flex; flex-direction: column; gap: 1rem; }
  </style>
</head>
<body>

<div class="results-wrap" id="resultsWrap">

  <!-- ── Hero card ── -->
  <div class="hero-card fade-up" id="heroCard">
    <div class="hero-top-strip"></div>

    <div class="trophy-wrap">
      <svg id="trophyIcon" class="trophy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
      </svg>
    </div>

    <h1 class="results-name" id="resultsName">Assessment Complete!</h1>
    <p class="results-sub">Here is the detailed breakdown of your performance.</p>

    <div class="stat-grid" id="statGrid">
      <div class="stat-box">
        <span class="stat-label">Final Score</span>
        <div>
          <span class="stat-value" id="statScore">—</span>
          <span class="stat-denom" id="statTotal">/20</span>
        </div>
      </div>
      <div class="stat-box">
        <span class="stat-label">Accuracy</span>
        <div><span class="stat-value" id="statPct">—</span></div>
      </div>
      <div class="stat-box" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <span class="stat-label">Assessed Level</span>
        <div class="skill-badge" id="skillBadge">—</div>
      </div>
    </div>

    <div class="action-row">
      <button class="btn btn-primary btn-lg" id="downloadBtn" onclick="downloadPDF()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PDF Report
      </button>
      <button class="btn btn-outline btn-lg" onclick="retake()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Retake Assessment
      </button>
    </div>
  </div>

  <!-- ── Detailed breakdown ── -->
  <div class="breakdown-card fade-up-delay">
    <div class="breakdown-header">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <h2>Detailed Review</h2>
    </div>
    <div class="results-list" id="resultsList"></div>
  </div>

</div>

<script>
  const raw = sessionStorage.getItem('qa_result');
  if (!raw) { window.location.href = 'index.html'; }
  const R = JSON.parse(raw);

  /* ── Score colour ── */
  function scoreClass(pct) {
    if (pct >= 80) return 'score-good';
    if (pct >= 60) return 'score-mid';
    return 'score-low';
  }
  const cls = scoreClass(R.percentage);

  /* ── Populate hero ── */
  document.getElementById('trophyIcon').style.color =
    R.percentage >= 80 ? 'var(--emerald)' : R.percentage >= 60 ? 'var(--primary)' : 'var(--amber)';

  document.getElementById('resultsName').textContent =
    'Assessment Complete, ' + R.name.split(' ')[0] + '!';

  const scoreEl = document.getElementById('statScore');
  scoreEl.textContent = R.score;
  scoreEl.className = 'stat-value ' + cls;

  document.getElementById('statTotal').textContent = '/' + R.total;

  const pctEl = document.getElementById('statPct');
  pctEl.textContent = R.percentage + '%';
  pctEl.className = 'stat-value ' + cls;

  document.getElementById('skillBadge').textContent = R.skillLevel;

  /* ── Confetti ── */
  if (R.percentage >= 70) {
    const duration = 3000;
    const end = Date.now() + duration;
    const colors = ['#4f6ef7','#14b8a6','#10b981'];
    (function frame() {
      confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors });
      confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors });
      if (Date.now() < end) requestAnimationFrame(frame);
    })();
  }

  /* ── Render result items ── */
  const list = document.getElementById('resultsList');
  R.results.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'result-item ' + (item.isCorrect ? 'correct' : 'incorrect');
    div.innerHTML = `
      <div class="result-icon ${item.isCorrect ? 'correct-icon' : 'incorrect-icon'}">
        ${item.isCorrect
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`
          : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`
        }
      </div>
      <div class="result-body">
        <p class="result-num">Question ${i + 1}</p>
        <p class="result-question">${item.question}</p>
        <div class="answer-grid">
          <div class="answer-box">
            <span class="answer-label">Your Answer</span>
            <span class="answer-value ${item.isCorrect ? 'right' : 'wrong'}">${item.userAnswer || '(skipped)'}</span>
          </div>
          ${!item.isCorrect ? `
          <div class="answer-box correct-ans">
            <span class="answer-label">Correct Answer</span>
            <span class="answer-value">${item.correctAnswer}</span>
          </div>` : ''}
        </div>
      </div>`;
    list.appendChild(div);
  });

  /* ── Retake ── */
  function retake() {
    sessionStorage.removeItem('qa_answers');
    sessionStorage.removeItem('qa_result');
    window.location.href = 'index.html';
  }

  /* ── Email helpers ── */
  const EMAIL_TARGET = 'snoyes@mmitnetwork.com';
  // Get an SMTPJS secure token from https://smtpjs.com/
  const SMTP_SECURE_TOKEN = 'YOUR_SMTPJS_SECURE_TOKEN';

  function sendEmailWithAttachment(base64Pdf) {
    if (!SMTP_SECURE_TOKEN || SMTP_SECURE_TOKEN === 'YOUR_SMTPJS_SECURE_TOKEN') {
      console.warn('SMTP secure token not set; skipping email send.');
      return Promise.resolve('No token');
    }

    return Email.send({
      SecureToken: SMTP_SECURE_TOKEN,
      To: EMAIL_TARGET,
      From: 'noreply@yourdomain.com',
      Subject: 'Quiz Assessment Report',
      Body: 'Attached is the completed quiz assessment report.',
      Attachments: [
        {
          name: 'quiz-assessment-report.pdf',
          data: 'data:application/pdf;base64,' + base64Pdf
        }
      ]
    });
  }

  /* ── PDF generation with jsPDF ── */
  function generatePdf() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const W = doc.internal.pageSize.getWidth();
    const H = doc.internal.pageSize.getHeight();
    const margin = 20;
    const usable = W - margin * 2;
    let y = margin;

    /* colours */
    const primaryRGB = [79, 110, 247];
    const tealRGB = [20, 184, 166];
    const slate9 = [15, 23, 42];
    const slate5 = [100, 116, 139];
    const slate2 = [226, 232, 240];

    /* helper: draw divider */
    function divider() {
      doc.setDrawColor(...slate2);
      doc.setLineWidth(.3);
      doc.line(margin, y, W - margin, y);
      y += 6;
    }

    /* helper: ensure space, add page if needed */
    function ensureSpace(needed) {
      if (y + needed > H - margin) {
        doc.addPage();
        y = margin;
        return true;
      }
      return false;
    }

    /* ─ Title bar ─ */
    doc.setFillColor(...primaryRGB);
    doc.rect(0, 0, W, 16, 'F');
    doc.setFillColor(...tealRGB);
    doc.rect(W / 2, 0, W / 2, 16, 'F');

    y = 26;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    doc.setTextColor(...slate9);
    doc.text('Quiz Assessment Report', W / 2, y, { align: 'center' });

    y += 7;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(...slate5);
    doc.text('Generated: ' + new Date(R.completedAt).toLocaleString(), W / 2, y, { align: 'center' });

    y += 10;
    divider();

    /* ─ User info ─ */
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(...slate9);
    doc.text('User Information', margin, y);
    y += 6;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(51, 65, 85);
    doc.text('Name:   ' + R.name, margin + 2, y);
    y += 5.5;
    doc.text('Email:  ' + R.email, margin + 2, y);
    y += 5.5;
    y += 4;
    divider();

    /* ─ Summary ─ */
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(...slate9);
    doc.text('Results Summary', margin, y);
    y += 6;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(51, 65, 85);
    doc.text('Score:       ' + R.score + ' / ' + R.total, margin + 2, y);
    y += 5.5;
    doc.text('Percentage:  ' + R.percentage + '%', margin + 2, y);
    y += 5.5;
    doc.text('Skill Level: ' + R.skillLevel, margin + 2, y);
    y += 5.5;
    y += 4;
    divider();

    /* ─ Detailed results ─ */
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(...slate9);
    doc.text('Detailed Results', margin, y);
    y += 8;

    R.results.forEach((item, i) => {
      ensureSpace(28);

      /* Question */
      const qLines = doc.splitTextToSize(`Q${i + 1}. ${item.question}`, usable);
      const qHeight = qLines.length * 5 + 2;
      ensureSpace(qHeight + 20);

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.setTextColor(...slate9);
      doc.text(qLines, margin, y);
      y += qHeight;

      /* Status tag */
      if (item.isCorrect) {
        doc.setTextColor(5, 150, 105);
        doc.text('✓ Correct', margin + 2, y);
      } else {
        doc.setTextColor(220, 38, 38);
        doc.text('✗ Incorrect', margin + 2, y);
      }
      y += 5.5;

      /* Your answer */
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(51, 65, 85);
      const yourAns = doc.splitTextToSize('Your Answer:    ' + (item.userAnswer || '(skipped)'), usable - 4);
      doc.text(yourAns, margin + 2, y);
      y += yourAns.length * 4.5;

      /* Correct answer (only if wrong) */
      if (!item.isCorrect) {
        doc.setTextColor(5, 150, 105);
        const corrAns = doc.splitTextToSize('Correct Answer: ' + item.correctAnswer, usable - 4);
        doc.text(corrAns, margin + 2, y);
        y += corrAns.length * 4.5;
      }

      y += 5;

      /* thin separator */
      if (i < R.results.length - 1) {
        doc.setDrawColor(...slate2);
        doc.setLineWidth(.2);
        doc.line(margin, y, W - margin, y);
        y += 5;
      }
    });

    /* ─ Footer on each page ─ */
    const totalPages = doc.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) {
      doc.setPage(p);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...slate5);
      doc.text(
        'Quiz Assessment Tool  •  Page ' + p + ' of ' + totalPages,
        W / 2, H - 10,
        { align: 'center' }
      );
    }

    return doc;
  }

  function downloadPDF() {
    const btn = document.getElementById('downloadBtn');
    btn.disabled = true;
    btn.innerHTML = `
      <svg class="spinner" style="width:18px;height:18px;animation:spin .7s linear infinite;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      Generating PDF…`;

    try {
      const doc = generatePdf();
      doc.save('quiz-assessment-report.pdf');

      // email the report (if configured)
      const pdfDataUri = doc.output('datauristring');
      const pdfBase64 = pdfDataUri.split(',')[1];
      sendEmailWithAttachment(pdfBase64)
        .then(msg => console.log('Email send status:', msg))
        .catch(err => console.warn('Email send failed', err));
    } catch (err) {
      alert('PDF generation failed. Please try again.');
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PDF Report`;
    }
  }
</script>

</body>
</html>
